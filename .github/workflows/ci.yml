name: CI Pipeline

# Déclencheurs : s'exécute à chaque push et pull_request sur main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Permet le déclenchement manuel depuis l'UI GitHub

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18", cache: "npm" }
      - run: npm ci
      - run: npm run lint

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18", cache: "npm" }
      - run: npm ci
      - run: npm test
